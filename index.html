<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRacing 2026 Season 2 Schedule</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sticky-top">
<div class="header">
  <div class="header-inner">
    <h1><span>iRacing</span> Schedule</h1>
    <p class="season-label" id="season-label"></p>
    <p class="subtitle" id="season-dates"></p>
    <a href='https://ko-fi.com/R5R41VWUGJ' target='_blank' class='kofi-img-btn' style='position:absolute;top:1.25rem;right:2rem;line-height:0;'><img style='border:0px;' src='https://storage.ko-fi.com/cdn/kofi3.png?v=6' border='0' alt='Buy Me a Coffee at ko-fi.com' /></a>
    <div class="filters">
      <span class="filter-label">Type</span>
      <div class="filter-group" id="cat-filters">
        <button class="filter-btn cat-oval active" data-cat="OVAL">Oval</button>
        <button class="filter-btn cat-sports active" data-cat="SPORTS CAR">Sports Car</button>
        <button class="filter-btn cat-formula active" data-cat="FORMULA CAR">Formula</button>
        <button class="filter-btn cat-dirt-oval active" data-cat="DIRT OVAL">Dirt Oval</button>
        <button class="filter-btn cat-dirt-road active" data-cat="DIRT ROAD">Dirt Road</button>
        <button class="filter-btn cat-unranked active" data-cat="UNRANKED">Unranked</button>
      </div>
      <span class="filter-label" style="margin-left:0.5rem">Class</span>
      <div class="filter-group" id="class-filters">
        <button class="filter-btn active" data-cls="R">R</button>
        <button class="filter-btn active" data-cls="D">D</button>
        <button class="filter-btn active" data-cls="C">C</button>
        <button class="filter-btn active" data-cls="B">B</button>
        <button class="filter-btn active" data-cls="A">A</button>
      </div>
      <input type="text" class="search-box" id="search" placeholder="Search series or track...">
      <span class="stats" id="stats"></span>
    </div>
  </div>
</div>

<div class="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">All Series</button>
    <button class="tab-btn" id="tab-week" onclick="switchTab('week')">This Week</button>
    <button class="tab-btn" id="tab-my" onclick="switchTab('my')">My Schedule <span class="tab-badge" id="my-schedule-count"></span></button>
  </div>
</div>
</div>

<div class="container">
  <div id="all-series-panel">
    <div class="series-grid" id="series-grid"></div>
  </div>
  <div id="my-schedule-panel" style="display:none"></div>
  <div id="this-week-panel" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
