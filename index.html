<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iRacing 2026 Season 2 Schedule</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sticky-top">
<div class="header">
  <div class="header-inner">
    <a href='https://ko-fi.com/R5R41VWUGJ' target='_blank' class='kofi-mobile-btn' aria-label='Buy Me a Coffee'><img src='https://storage.ko-fi.com/cdn/logomarkLogo.png' alt='Ko-fi'></a>
    <div class="header-left">
      <h1><span>iRacing</span> Schedule</h1>
      <p class="season-label" id="season-label"></p>
      <p class="subtitle" id="season-dates"></p>
    </div>
    <div class="header-right">
      <div class="search-wrap">
        <svg class="search-icon-svg" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/><line x1="12.5" y1="12.5" x2="17" y2="17" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input type="text" class="search-box" id="search" placeholder="">
        <div class="search-typewriter" id="search-typewriter" aria-hidden="true"><span class="tw-text"></span><span class="tw-cursor"></span></div>
      </div>
      <button class="mobile-filter-btn" id="mobile-filter-btn" onclick="openFilterDrawer()">Filters <span id="filter-active-count"></span></button>
      <span class="stats" id="stats"></span>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" aria-label="Toggle light/dark mode"></button>
    </div>
  </div>
</div>

<div class="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-btn active" id="tab-all" onclick="switchTab('all')">All Series</button>
    <button class="tab-btn" id="tab-week" onclick="switchTab('week')">This Week</button>
    <button class="tab-btn" id="tab-my" onclick="switchTab('my')">My Schedule <span class="tab-badge" id="my-schedule-count"></span></button>
  </div>
</div>
</div>

<div class="main-layout">
  <aside class="filter-sidebar" id="filter-sidebar">
    <div class="filter-section">
      <div class="filter-section-header">Type</div>
      <div class="filter-group" id="cat-filters">
        <button class="filter-btn cat-oval active" data-cat="OVAL">Oval</button>
        <button class="filter-btn cat-sports active" data-cat="SPORTS CAR">Sports Car</button>
        <button class="filter-btn cat-formula active" data-cat="FORMULA CAR">Formula</button>
        <button class="filter-btn cat-dirt-oval active" data-cat="DIRT OVAL">Dirt Oval</button>
        <button class="filter-btn cat-dirt-road active" data-cat="DIRT ROAD">Dirt Road</button>
        <button class="filter-btn cat-unranked active" data-cat="UNRANKED">Unranked</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-section-header">Class</div>
      <div class="filter-group" id="class-filters">
        <button class="filter-btn active" data-cls="R">R</button>
        <button class="filter-btn active" data-cls="D">D</button>
        <button class="filter-btn active" data-cls="C">C</button>
        <button class="filter-btn active" data-cls="B">B</button>
        <button class="filter-btn active" data-cls="A">A</button>
      </div>
    </div>
    <div class="filter-section">
      <div class="filter-section-header">
        Car
        <button class="filter-clear-btn" id="car-clear-btn" onclick="clearCarFilter()">Clear</button>
      </div>
      <div class="autocomplete-wrap">
        <input type="text" class="car-search-input" id="car-search" placeholder="Search cars..."
               autocomplete="off"
               oninput="filterAutocomplete('car', this.value)"
               onfocus="showAutocomplete('car')"
               onblur="setTimeout(() => hideAutocomplete('car'), 150)">
        <div class="autocomplete-dropdown" id="car-dropdown"></div>
      </div>
      <div class="selected-tags" id="car-tags"></div>
    </div>
    <div class="filter-section">
      <div class="filter-section-header">
        Track
        <button class="filter-clear-btn" id="track-clear-btn" onclick="clearTrackFilter()">Clear</button>
      </div>
      <div class="autocomplete-wrap">
        <input type="text" class="car-search-input" id="track-search" placeholder="Search tracks..."
               autocomplete="off"
               oninput="filterAutocomplete('track', this.value)"
               onfocus="showAutocomplete('track')"
               onblur="setTimeout(() => hideAutocomplete('track'), 150)">
        <div class="autocomplete-dropdown" id="track-dropdown"></div>
      </div>
      <div class="selected-tags" id="track-tags"></div>
    </div>
    <a href='https://ko-fi.com/R5R41VWUGJ' target='_blank' class='kofi-img-btn'><img style='border:0px;' src='https://storage.ko-fi.com/cdn/kofi3.png?v=6' border='0' alt='Buy Me a Coffee at ko-fi.com' /></a>
  </aside>
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeFilterDrawer()"></div>
  <div class="content-area">
    <div class="container">
      <div id="all-series-panel">
        <div class="series-grid" id="series-grid"></div>
      </div>
      <div id="my-schedule-panel" style="display:none"></div>
      <div id="this-week-panel" style="display:none"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
