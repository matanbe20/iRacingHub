<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="r">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="7" fill="#1a1d27"/>
  <g clip-path="url(#r)">
    <!-- 4×4 checkered flag: white + blue on dark -->
    <!-- Row 0 -->
    <rect x="0"  y="0"  width="8" height="8" fill="#ffffff"/>
    <rect x="8"  y="0"  width="8" height="8" fill="#3b82f6"/>
    <rect x="16" y="0"  width="8" height="8" fill="#ffffff"/>
    <rect x="24" y="0"  width="8" height="8" fill="#3b82f6"/>
    <!-- Row 1 -->
    <rect x="0"  y="8"  width="8" height="8" fill="#3b82f6"/>
    <rect x="8"  y="8"  width="8" height="8" fill="#ffffff"/>
    <rect x="16" y="8"  width="8" height="8" fill="#3b82f6"/>
    <rect x="24" y="8"  width="8" height="8" fill="#ffffff"/>
    <!-- Row 2 -->
    <rect x="0"  y="16" width="8" height="8" fill="#ffffff"/>
    <rect x="8"  y="16" width="8" height="8" fill="#3b82f6"/>
    <rect x="16" y="16" width="8" height="8" fill="#ffffff"/>
    <rect x="24" y="16" width="8" height="8" fill="#3b82f6"/>
    <!-- Row 3 -->
    <rect x="0"  y="24" width="8" height="8" fill="#3b82f6"/>
    <rect x="8"  y="24" width="8" height="8" fill="#ffffff"/>
    <rect x="16" y="24" width="8" height="8" fill="#3b82f6"/>
    <rect x="24" y="24" width="8" height="8" fill="#ffffff"/>
  </g>
</svg>
